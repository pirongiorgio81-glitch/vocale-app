<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocale App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192.png?text=Vocale">

    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
        }
        #status {
            margin: 20px 0;
            color: #555;
            font-style: italic;
        }
        #result {
            border: 1px solid #ccc;
            padding: 10px;
            min-height: 50px;
            margin-bottom: 20px;
            border-radius: 8px;
            background: #fafafa;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }
        #startBtn { background-color: #28a745; color: white; }
        #stopBtn { background-color: #dc3545; color: white; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2>Riconoscimento Vocale</h2>
    <div id="status">Pronto per iniziare</div>
    <div id="result">Il testo apparirà qui...</div>
    
    <button id="startBtn">Avvia Registrazione</button>
    <button id="stopBtn" disabled>Ferma</button>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const result = document.getElementById('result');

    // Controllo compatibilità browser
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        status.textContent = "Errore: Browser non supportato.";
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'it-IT';
        recognition.continuous = true;
        recognition.interimResults = true;

        startBtn.onclick = () => {
            recognition.start();
            status.textContent = "Ascolto in corso...";
            startBtn.disabled = true;
            stopBtn.disabled = false;
        };

        stopBtn.onclick = () => {
            recognition.stop();
        };

        recognition.onresult = (event) => {
            let transcript = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            result.textContent = transcript;
        };

        recognition.onend = () => {
            status.textContent = "Registrazione terminata.";
            startBtn.disabled = false;
            stopBtn.disabled = true;
        };

        recognition.onerror = (event) => {
            status.textContent = "Errore: " + event.error;
            startBtn.disabled = false;
            stopBtn.disabled = true;
        };
    }
</script>

</body>
</html>
